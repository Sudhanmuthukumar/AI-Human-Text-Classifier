<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Get in touch with the TextOrigin team — questions, suggestions, or feedback." />
  <title>Contact — TextOrigin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="logo">
      <span class="glass"></span><span>Text<strong>Origin</strong></span>
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('contact') }}" class="active">Contact</a>
    </nav>
  </div>
</header>

<main class="container-narrow">
  <section class="page">
    <h2>Get in touch</h2>
    <p>Have a question, found a bug, or just want to say hello? Drop us a message and we'll get back to you.</p>

    <form class="contact-form">
      <label for="name">Name</label>
      <input id="name" type="text" placeholder="Your name" class="input">

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" class="input">

      <label for="message">Message</label>
      <textarea id="message" placeholder="What's on your mind?" class="input"></textarea>

      <button type="button" class="btn default" style="align-self:flex-start;margin-top:4px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send
      </button>
    </form>
  </section>
</main>

<footer>
  <div>&copy; TextOrigin</div>
  <div class="social">
    <a href="#">GitHub</a>
    <a href="#">LinkedIn</a>
    <a href="mailto:hello@textorigin.example">Email</a>
  </div>
</footer>
</body>
</html>
